  <rect x="72" y="44" width="12" height="28" rx="1" fill="#7B5CF0" transform="skewX(-12)" />
  <rect x="96" y="44" width="12" height="28" rx="1" fill="#7B5CF0" transform="skewX(-12)" />
  <rect x="120" y="44" width="12" height="28" rx="1" fill="#7B5CF0" transform="skewX(-12)" />
  <!-- Clapperboard body -->
